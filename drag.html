<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="Stylesheet" href="Style.css">
    <link rel="Stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}
body{
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #322b2b;
}
.drag-area{
    border: 6px dashed #db8d8d;
    height: 170px;
    width: 250px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;padding: 10px;
}
.drag-area.active{
    border: 10px dashed #892c2c;
}
.icon{
    font-size: 25px;
    color: #fff;
}
header{
    font-size: 12px;
    font-weight: 500;
    color: #fff;
}
span{
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    margin: 10px 0 10px 0;
}
button{
    padding: 7px 15px;
    font-size: 12px;
    font-weight: 500;
    border: none;
    outline: none;
    background: #fff;
    color: #892c2c;
    border-radius: 5px;
    cursor: pointer;
}
    </style>
</head>
<body>
    <div class="drag-area">
        <div class="icon">
            <i class="fa-solid fa-cloud-arrow-up"></i>
        </div>
        <header>Drag & Drop to Upload File</header>
        <span>OR</span>
        <button>Browse File</button>
        <input type="file" hidden>
    </div>

    <script>
        const dropArea = document.querySelector(".drag-area"),
    dragText = dropArea.querySelector("header"),
    button = dropArea.querySelector("button"),
    input = dropArea.querySelector("input");
let file;
button.onclick = () => {
    input.click();
}
input.addEventListener("change", function() {
    file = this.files[0];
    dropArea.classList.add("active");
    showFile();
});
dropArea.addEventListener("dragover", (event) => {
    event.preventDefault();
    dropArea.classList.add("active");
    dragText.textContent = "Release to Upload File";
});
dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("active");
    dragText.textContent = "Drag & Drop to Upload File";
});
dropArea.addEventListener("drop", (event) => {
    event.preventDefault();
    file = event.dataTransfer.files[0];
    showFile();
});
function showFile() {
    let fileType = file.type;
    let validExtensions = ["image/jpeg", "image/jpg", "image/png", "application/pdf", ".doc", ".docx", "video/mp4", ".xml", "application/msword", "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    ];
    console.log(fileType)
    if (validExtensions.includes(fileType)) {
        let fileReader = new FileReader();
        fileReader.onload = () => {
            let fileURL = fileReader.result;
            dropArea.classList.remove("active");
            dragText.textContent = "The file is successfully uploaded."
            setTimeout(() => {
                dragText.textContent = "Drag & Drop to Upload File"
            }, 2000)
        }
        fileReader.readAsDataURL(file);
    } else {
        alert("This is not an valid file!");
        dropArea.classList.remove("active");
        dragText.textContent = "Drag & Drop to Upload File";
    }
}
    </script>
</body>
<script src="Script.js"></script>
</html>
